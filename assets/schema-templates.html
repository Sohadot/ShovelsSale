<!--
  =====================================================================
  SHOVELSSALE.COM — STRUCTURED DATA REFERENCE LIBRARY
  =====================================================================

  PURPOSE
  ---------------------------------------------------------------------
  This file serves as the semantic reference library for ShovelsSale.com.
  It is not a page fragment to be indexed directly.
  It documents the recommended JSON-LD blocks for the site's main content
  types and system layers.

  SYSTEM ROLE
  ---------------------------------------------------------------------
  ShovelsSale.com is not modeled as a generic blog. It is modeled as a
  reference-grade analytical system with four primary layers:

  1. Doctrine   → Manifesto
  2. Method     → Framework
  3. Instrument → Scanner
  4. Archive    → Dispatch + Blog

  This file contains production-ready schema patterns for:
  - Website / Homepage
  - About page
  - Manifesto
  - Framework
  - Scanner
  - Dispatch archive
  - Dispatch issues
  - Blog archive
  - Blog posts

  USAGE
  ---------------------------------------------------------------------
  - Do NOT expose this file as an indexed public page
  - Do NOT treat this as the canonical source of truth for dates
  - Prefer injecting or embedding schema directly into each real page
  - Keep URLs, dates, and descriptions aligned with live content
  - When possible, automate generation from Python pipeline

  NOTES
  ---------------------------------------------------------------------
  - Replace placeholder values before production use
  - Keep all URLs absolute
  - Keep all dates in ISO-8601 format
  - Prefer Organization as publisher across the system
  - Prefer ItemList / CollectionPage for archive surfaces
  - Prefer Article / BlogPosting for real publications

  =====================================================================
-->
