name: Weekly Update + Security Scan

on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

# No top-level permissions — each job declares only what it needs.

jobs:
  security-audit:
    runs-on: ubuntu-latest
    # Read-only: this job audits but never commits anything.
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install security scan dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install beautifulsoup4 lxml

      - name: Run security scan
        run: |
          python scripts/security_scan.py
        # Exits with code 1 when critical issues are found.
        # Failures are visible in the workflow status.

  content-update:
    runs-on: ubuntu-latest
    # Write access required for committing generated outputs.
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install publishing dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install beautifulsoup4 lxml

      - name: Run publishing pipeline
        run: |
          python scripts/publish_pipeline.py

      - name: Commit generated updates
        run: |
          git config --local user.email "bot@shovelssale.com"
          git config --local user.name "ShovelsSale Bot"

          # Stage known generated outputs explicitly.
          git add blog/ sitemap.xml || true
          git add blog/feed.xml dispatch/feed.xml 2>/dev/null || true

          if git diff --staged --quiet; then
            echo "No generated changes to commit."
          else
            git commit -m "Weekly publishing update — $(date +%Y-%m-%d)"
            # Rebase against any commits pushed to remote since checkout
            # before pushing, to avoid non-fast-forward rejection.
            git pull --rebase origin main
            git push
          fi

  sitemap-ping:
    runs-on: ubuntu-latest
    needs: content-update
    # No repo access needed — outbound HTTP only.
    permissions:
      contents: none

    steps:
      - name: Ping sitemap endpoints
        run: |
          curl -s "https://www.google.com/ping?sitemap=https://shovelssale.com/sitemap.xml" || true
          curl -s "https://www.bing.com/ping?sitemap=https://shovelssale.com/sitemap.xml" || true
