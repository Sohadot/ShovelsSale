name: Weekly Update + Security Scan

on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

jobs:
  security-audit:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install --break-system-packages beautifulsoup4 lxml
      - run: python scripts/security_scan.py

  content-update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install --break-system-packages beautifulsoup4 lxml
      - run: python scripts/automate.py
      - run: python scripts/update_sitemap.py
      - run: |
          git config --local user.email "bot@shovelssale.com"
          git config --local user.name "ShovelsSale Bot"
          git add -A
          git diff --staged --quiet || git commit -m "Weekly update — $(date +%Y-%m-%d)"
          git push

  sitemap-ping:
    runs-on: ubuntu-latest
    needs: content-update
    steps:
      - run: curl -s "https://www.google.com/ping?sitemap=https://shovelssale.com/sitemap.xml"
      - run: curl -s "https://www.bing.com/ping?sitemap=https://shovelssale.com/sitemap.xml"
