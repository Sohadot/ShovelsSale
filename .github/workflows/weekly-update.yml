name: Weekly Update + Security Scan

on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

# No top-level permissions — each job declares only what it needs.

concurrency:
  group: weekly-update-security-scan-${{ github.ref }}
  cancel-in-progress: false

jobs:
  security-audit:
    runs-on: ubuntu-latest
    # Read-only: this job audits but never commits anything.
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install security scan dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install beautifulsoup4 lxml

      - name: Run security scan
        run: |
          python scripts/security_scan.py
        # Exits with code 1 when critical issues are found.
        # Failures are visible in the workflow status.

  content-update:
    runs-on: ubuntu-latest
    # Write access required only for committing generated outputs.
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install publishing dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install beautifulsoup4 lxml

      - name: Configure Git identity
        run: |
          git config --local user.email "bot@shovelssale.com"
          git config --local user.name "ShovelsSale Bot"

      - name: Rebase onto latest main before generation
        run: |
          git pull --rebase origin main

      - name: Run publishing pipeline
        run: |
          python scripts/publish_pipeline.py

      - name: Run sovereign quality gate
        run: |
          python scripts/quality_gate.py

      - name: Commit generated updates
        run: |
          set -euo pipefail

          # Stage known generated outputs explicitly.
          if [ -d "blog" ]; then
            git add blog/
          fi

          if [ -f "sitemap.xml" ]; then
            git add sitemap.xml
          fi

          if [ -f "blog/feed.xml" ]; then
            git add blog/feed.xml
          fi

          if [ -f "dispatch/feed.xml" ]; then
            git add dispatch/feed.xml
          fi

          if git diff --staged --quiet; then
            echo "No generated changes to commit."
            exit 0
          fi

          git commit -m "Weekly publishing update — $(date +%Y-%m-%d)"

      - name: Rebase committed update and push
        run: |
          git pull --rebase origin main
          git push origin HEAD:main

  sitemap-ping:
    runs-on: ubuntu-latest
    needs: content-update
    # No repo access needed — outbound HTTP only.
    permissions:
      contents: none

    steps:
      - name: Ping Bing sitemap endpoint
        run: |
          curl -s "https://www.bing.com/ping?sitemap=https://shovelssale.com/sitemap.xml" || true

