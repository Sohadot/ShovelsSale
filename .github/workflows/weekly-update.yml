name: Weekly Update + Security Scan

on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  security-audit:
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install security scan dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --break-system-packages beautifulsoup4 lxml

      - name: Run security scan
        run: |
          python scripts/security_scan.py

  content-update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install publishing dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --break-system-packages beautifulsoup4 lxml

      - name: Run publishing pipeline
        run: |
          python scripts/publish_pipeline.py

      - name: Commit generated updates
        run: |
          git config --local user.email "bot@shovelssale.com"
          git config --local user.name "ShovelsSale Bot"

          git add blog/index.html sitemap.xml blog/feed.xml dispatch/feed.xml

          git diff --staged --quiet || git commit -m "Weekly publishing update — $(date +%Y-%m-%d)"
          git push

  sitemap-ping:
    runs-on: ubuntu-latest
    needs: content-update

    steps:
      - name: Ping sitemap endpoints
        run: |
          curl -s "https://www.google.com/ping?sitemap=https://shovelssale.com/sitemap.xml" || true
          curl -s "https://www.bing.com/ping?sitemap=https://shovelssale.com/sitemap.xml" || true
