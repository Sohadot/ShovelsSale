<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — Page Not Found | ShovelsSale.com</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="canonical" href="https://shovelssale.com/">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;1,400&family=Bebas+Neue&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
  <style>
    :root {
      --gold: #C9A84C; --gold-dim: #7A5F2A;
      --black: #080808; --white: #F5F0E8; --white-dim: #9A9080;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--black); color: var(--white);
      font-family: 'Cormorant Garamond', serif;
      min-height: 100vh; display: flex; flex-direction: column;
      justify-content: center; align-items: center; text-align: center;
      padding: 3rem;
    }
    .code {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(8rem, 25vw, 18rem);
      line-height: 1; color: #141414;
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none; user-select: none;
    }
    .content { position: relative; z-index: 1; }
    .label {
      font-family: 'DM Mono', monospace; font-size: 0.6rem;
      color: var(--gold); letter-spacing: 0.3em;
      text-transform: uppercase; margin-bottom: 1.5rem;
    }
    h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(2rem, 6vw, 4rem);
      color: var(--white); margin-bottom: 1rem;
    }
    p {
      font-style: italic; color: var(--white-dim);
      font-size: 1.2rem; margin-bottom: 2.5rem; max-width: 400px;
    }
    a {
      font-family: 'DM Mono', monospace; font-size: 0.7rem;
      letter-spacing: 0.15em; text-transform: uppercase;
      color: var(--black); background: var(--gold);
      padding: 0.9rem 2rem; text-decoration: none;
      transition: background 0.3s;
    }
    a:hover { background: #E8C97A; }
  </style>
</head>
<body>
  <div class="code">404</div>
  <div class="content">
    <p class="label">Lost in the rush</p>
    <h1>Wrong Mine.</h1>
    <p>This page doesn't exist. The shovels are elsewhere.</p>
    <a href="/">Back to the Shovels →</a>
  </div>
</body>
</html>
